# HuGGeMs-update Conda Environment Configuration
# Version: 1.0
# Description: Environment for HuGGeMs database update pipelines

name: huggems-update

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core Python and dependencies
  - python=3.9
  - pip

  # Part I: Genome distance comparison tools (dRep pipeline)
  - mash
  - mummer
  - fastani
  - centrifuge  # optional/recommended

  # Part II: Marker gene selection tools
  - prokka=1.14.6
  - diamond
  - mmseqs2
  - art
  - bowtie2
  - samtools
  - bamutil
  - biopython

  # Additional dependencies
  - gsl=2.5

  # Core utilities
  - numpy
  - pandas
  - scipy

# Install dRep via pip (not available in conda)
pip:
  - drep

# Platform-specific notes:
# - On Apple Silicon (arm64), some packages may need compilation from source
# - centrifuge may have compatibility issues on newer systems; consider alternatives
